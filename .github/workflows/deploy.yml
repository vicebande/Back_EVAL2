name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/back-eval2:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Private EC2 via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          # Datos de la EC2 Privada (Backend)
          host: ${{ secrets.EC2_BACK_PRIVATE_IP }}
          username: ${{ secrets.EC2_BACK_USER }}
          key: ${{ secrets.EC2_BACK_SSH_KEY }}
          
          # Datos de la EC2 Pública (Front / Bastion)
          proxy_host: ${{ secrets.EC2_FRONT_PUBLIC_IP }}
          proxy_username: ${{ secrets.EC2_FRONT_USER }}
          proxy_key: ${{ secrets.EC2_FRONT_SSH_KEY }}
          
          script: |
            # Ir al directorio del backend
            mkdir -p ~/back-eval2
            cd ~/back-eval2
            
            # Crear archivo .env con los secretos
            echo "PORT=3000" > .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env

            # Descargar imagen nueva primero (minimiza downtime)
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/back-eval2:latest

            # Limpiar contenedores viejos
            sudo docker compose down || true
            sudo docker rm -f back-eval2 || true
            
            # Crear docker-compose.yml dinámicamente
            cat <<EOF > docker-compose.yml
            services:
              backend:
                image: ${{ secrets.DOCKER_USERNAME }}/back-eval2:latest
                container_name: back-eval2
                ports:
                  - "3000:3000"
                env_file:
                  - .env
                restart: always
            EOF

            # Levantar el nuevo
            sudo docker compose up -d

            # Borrar imágenes viejas/huérfanas
            sudo docker image prune -f
